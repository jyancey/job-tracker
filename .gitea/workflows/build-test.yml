name: Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Test
    runs-on: macos-arm64
    env:
      npm_config_script_shell: /bin/bash
      PATH: ${{ vars.RUNNER_PATH }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild

      - name: Run linter
        run: pnpm lint

      - name: Run tests
        run: pnpm test:run

  build:
    name: Build
    runs-on: macos-arm64
    needs: test
    env:
      npm_config_script_shell: /bin/bash
      PATH: ${{ vars.RUNNER_PATH }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild

      - name: Build application
        run: pnpm build

      - name: Package standalone bundle
        run: ./scripts/package-standalone.sh build-artifact

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-standalone
          path: build-artifact/
          retention-days: 7
          include-hidden-files: true
