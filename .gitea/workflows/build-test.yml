name: Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test:
    name: Build & Test (Podman)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Podman and Podman Compose are installed
        run: |
          if ! command -v podman >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y podman
          fi
          if ! command -v podman-compose >/dev/null 2>&1; then
            sudo apt-get install -y podman-compose
          fi

      - name: Build, lint, test, and package frontend with Podman Compose
        run: |
          chmod +x ./scripts/podman-release.sh
          ./scripts/podman-release.sh \
            "v0.0.0-ci.${{ github.run_number }}" \
            build-artifact

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-standalone
          path: build-artifact/
          retention-days: 7
          include-hidden-files: true
