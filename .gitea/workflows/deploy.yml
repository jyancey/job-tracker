name: Deploy

on:
  workflow_run:
    workflows: ["Build & Test"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Podman and Podman Compose are installed
        run: |
          if ! command -v podman >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y podman
          fi
          if ! command -v podman-compose >/dev/null 2>&1; then
            sudo apt-get install -y podman-compose
          fi

      - name: Create deployment artifact
        run: |
          chmod +x ./scripts/podman-deploy.sh
          ./scripts/podman-deploy.sh \
            "v0.0.0-deploy.${{ github.run_number }}" \
            deploy \
            "${{ github.sha }}" \
            "${{ github.ref_name }}"

      - name: Deploy artifact information
        run: |
          /bin/echo "Deployment ready:"
          /bin/echo "- Standalone Next.js server in deploy/server.js"
          /bin/echo "- Static assets in deploy/.next/static/ and deploy/public/"
          /bin/echo "- macOS helpers in deploy/macos/"
          /bin/echo "- Start with: node server.js or ./macos/start-job-tracker.sh"
          /bin/ls -la deploy/

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v3
        with:
          name: deployment-build-${{ github.run_number }}
          path: deploy/
          retention-days: 30
          include-hidden-files: true
