name: Deploy

on:
  workflow_run:
    workflows: ["Build & Test"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: macos-arm64
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    env:
      npm_config_script_shell: /bin/bash
      PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild

      - name: Build application
        run: npm run build

      - name: Create deployment artifact
        run: |
          /bin/mkdir -p deploy
          /bin/cp -r dist/* deploy/
          /bin/echo "Build timestamp: $(/bin/date -u +'%Y-%m-%dT%H:%M:%SZ')" > deploy/BUILD_INFO.txt
          /bin/echo "Git commit: ${{ github.sha }}" >> deploy/BUILD_INFO.txt
          /bin/echo "Git branch: ${{ github.ref_name }}" >> deploy/BUILD_INFO.txt

      - name: Deploy artifact information
        run: |
          /bin/echo "Deployment ready:"
          /bin/echo "- Static files ready in deploy/ directory"
          /bin/echo "- Can be deployed to any static host (Netlify, Vercel, GitHub Pages, etc.)"
          /bin/echo "- Recommended: Copy dist/ folder to your hosting provider"
          /bin/ls -la deploy/

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-build-${{ github.run_number }}
          path: deploy/
          retention-days: 30
