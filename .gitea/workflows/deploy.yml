name: Deploy

on:
  workflow_run:
    workflows: ["Build & Test"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: macos-arm64
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    env:
      npm_config_script_shell: /bin/bash
      PATH: ${{ vars.RUNNER_PATH }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild

      - name: Build application
        run: npm run build

      - name: Create deployment artifact
        run: |
          ./scripts/package-standalone.sh deploy
          /bin/echo "Build timestamp: $(/bin/date -u +'%Y-%m-%dT%H:%M:%SZ')" > deploy/BUILD_INFO.txt
          /bin/echo "Git commit: ${{ github.sha }}" >> deploy/BUILD_INFO.txt
          /bin/echo "Git branch: ${{ github.ref_name }}" >> deploy/BUILD_INFO.txt

      - name: Deploy artifact information
        run: |
          /bin/echo "Deployment ready:"
          /bin/echo "- Standalone Next.js server in deploy/server.js"
          /bin/echo "- Static assets in deploy/.next/static/ and deploy/public/"
          /bin/echo "- macOS helpers in deploy/macos/"
          /bin/echo "- Start with: node server.js or ./macos/start-job-tracker.sh"
          /bin/ls -la deploy/

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v3
        with:
          name: deployment-build-${{ github.run_number }}
          path: deploy/
          retention-days: 30
          include-hidden-files: true
