name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    name: Build & Package Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      npm_config_script_shell: /bin/bash
      PATH: ${{ vars.RUNNER_PATH }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: tag_version
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v0.0.0-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure Podman is installed
        run: |
          if ! command -v podman >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y podman
          fi
          if ! command -v podman-compose >/dev/null 2>&1; then
            sudo apt-get install -y podman-compose
          fi

      - name: Ensure release scripts are executable
        run: |
          chmod +x ./scripts/podman-release.sh ./scripts/podman-deploy.sh

      - name: Create source tarball
        run: |
          /bin/mkdir -p release/${{ steps.tag_version.outputs.version }}
          /usr/bin/tar --exclude='node_modules' --exclude='.git' --exclude='.next' --exclude='dist' \
            -czf release/${{ steps.tag_version.outputs.version }}/job-tracker-${{ steps.tag_version.outputs.version }}-source.tar.gz .
        shell: bash

      - name: Build frontend Podman release artifacts
        run: |
          ./scripts/podman-release.sh \
            "${{ steps.tag_version.outputs.version }}" \
            "release/${{ steps.tag_version.outputs.version }}"
        shell: bash

      - name: Create release notes
        run: |
          /bin/cat > release/${{ steps.tag_version.outputs.version }}/RELEASE_NOTES.md << 'EOF'
          # Job Tracker ${{ steps.tag_version.outputs.version }}

          ## What's New
          - Enhanced hero section with logo and metrics display
          - Improved macOS-style UI with frosted glass effect
          - Build and test pipeline with automated releases

          ## Downloads
          - `job-tracker-${{ steps.tag_version.outputs.version }}-standalone.zip` - Standalone Next.js server bundle
          - `job-tracker-${{ steps.tag_version.outputs.version }}-standalone.tar.gz` - Standalone bundle as tarball
          - `job-tracker-${{ steps.tag_version.outputs.version }}-oci-image.tar.gz` - OCI image archive built with Podman
          - `job-tracker-${{ steps.tag_version.outputs.version }}-source.tar.gz` - Source code

          ## Installation
          Extract the standalone zip and start it with `node server.js`.
          For macOS launchd setup, run `./macos/install-launch-agent.sh`.

          ## Testing
          All tests passing (11/11). Build verified and production-ready.
          EOF

      - name: Upload packaged release artifacts
        uses: actions/upload-artifact@v3
        with:
          name: release-${{ steps.tag_version.outputs.version }}
          path: release/${{ steps.tag_version.outputs.version }}/
          retention-days: 30

      - name: Publish release assets
        run: |
          cd release/${{ steps.tag_version.outputs.version }}
          /bin/ls -la
        shell: bash
